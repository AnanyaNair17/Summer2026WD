<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="
      playGame('Rock');
    ">Rock</button>
    
    <button onclick="
      playGame('Paper');
    ">Paper</button>

    <button onclick="
      playGame('Scissors');
    ">Scissors</button>
    <script>
      function playGame(move){
        const computerMove = pickComputerMove();
        let result = '';

        if(move==='Rock'){
          if(computerMove==='Rock'){
            result = 'It is a Tie.';
          }
          else if(computerMove==='Paper'){
            result = 'You Lose.';
          }
          else{
            result = 'You Win.';
          }
        }
        else if(move==='Paper'){
          if(computerMove==='Paper'){
            result = 'It is a Tie.';
          }
          else if(computerMove==='Scissors'){
            result = 'You Lose.';
          }
          else{
            result = 'You Win.';
          }
        }
        else{
          if(computerMove==='Scissors'){
            result = 'It is a Tie.';
          }
          else if(computerMove=='Rock'){
            result = 'You Lose.';
          }
          else{
            result = 'You Win.';
          }
        }
        alert(`You picked ${move}. Computer picked ${computerMove}. ${result}`);
      }

      function pickComputerMove(){
        const randomNumber = Math.random();
        let computerMove = '';
        if(randomNumber<1/3){
          computerMove = 'rock';
        }
        else if(randomNumber>=1/3 && randomNumber<2/3){
          computerMove = 'paper';
        }
        else{
          computerMove = 'Scissors';
        }
        return computerMove;
      }
    </script>
  </body>
</html>
