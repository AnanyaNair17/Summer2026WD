<!DOCTYPE html>
<html>
  <head>
    <title>Variables</title>
    
  </head>
  <body>
    
    <script>
      let var1 = 3;
      console.log(var1);

      let calculation = 2+2;
      console.log(calculation);
      console.log(calculation+2); 
      
      let msg = 'hello';
      console.log(msg);

      var1 = 5;
      console.log(var1);

      const var2 = 3;
      console.log(var2);

      console.log(typeof var2);
    </script>
  </body>
</html>
