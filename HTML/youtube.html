<!DOCTYPE html>
<html>
    <head>
        <title>Youtube.com clone</title>
        <style>
            .thumbnail{
                width: 300px;
                display: block;
            }

            .search-bar{
                display: block;
            }

            .video-title{
                width: 300px;
            }
            
            .video-preview{
                width: 300px;
                display: inline-block;
                vertical-align: top;
                margin-right: 15px;
            }
            
        </style>
    </head>
    <body>
        <input class="search-bar" type="text" placeholder="Search">

        <div class="video-preview">
            <img class="thumbnail" src="thumbnails/thumbnail-1.webp">
            <p class="video-title">
                Talking Tech and AI with Google CEO Sundar Pichai!
            </p>
            <p class="video-author">
                Marques Brownlee
            </p>
            <p class="video-stats">
                3.4M views &#183; 6 months ago
            </p>
        </div>

        <div class="video-preview">
            <img class="thumbnail" src="thumbnails/thumbnail-2.webp">
            <p class="video-title">  
                Try Not To Laugh Challenge #9
            </p>
            <p class="video-author">
                Markiplier
            </p>
            <p class="video-stats">
                19M views &#183; 4 years ago
            </p>
        </div>
    </body>
</html> 
<!--
1. block element - take up the entire line in their CONTAINER regardless of the space they need
2. inline block element - only takes up as much as space as needed 
3. inline elemnt - appear within a block of text (like text inside <strong> tag)
    .video-author,
    .video-stats{
         display: inline-block;
    }
4. div is a block element, can be changed to inline block
-->
